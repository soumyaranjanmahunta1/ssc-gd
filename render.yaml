services:
  - type: web
    name: sscgd-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Must be set in Render dashboard or sync from env
      - key: NODE_ENV
        value: production
